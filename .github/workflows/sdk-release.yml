name: SDK Release

on:
  push:
    tags:
      - "sdk-ts-v*"
      - "sdk-py-v*"
      - "sdk-rs-v*"

jobs:
  release-typescript:
    if: startsWith(github.ref, 'refs/tags/sdk-ts-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test --if-present
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-python:
    if: startsWith(github.ref, 'refs/tags/sdk-py-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade build twine
      - run: python -m build --wheel --sdist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist

  release-rust:
    if: startsWith(github.ref, 'refs/tags/sdk-rs-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust
      - run: cargo test --all-features
      - run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

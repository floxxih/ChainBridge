version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chainbridge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chainbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chainbridge_dev}
      POSTGRES_DB: ${POSTGRES_DB:-chainbridge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chainbridge} -d ${POSTGRES_DB:-chainbridge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chainbridge-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chainbridge-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-chainbridge_redis_dev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - chainbridge-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chainbridge-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chainbridge}:${POSTGRES_PASSWORD:-chainbridge_dev}@postgres:5432/${POSTGRES_DB:-chainbridge}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-chainbridge}:${POSTGRES_PASSWORD:-chainbridge_dev}@postgres:5432/${POSTGRES_DB:-chainbridge}
      REDIS_URL: redis://:${REDIS_PASSWORD:-chainbridge_redis_dev}@redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      DEBUG: ${DEBUG:-false}
      PORT: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chainbridge-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  chainbridge-network:
    driver: bridge

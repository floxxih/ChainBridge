version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chainbridge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chainbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chainbridge_dev}
      POSTGRES_DB: ${POSTGRES_DB:-chainbridge}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chainbridge} -d ${POSTGRES_DB:-chainbridge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chainbridge-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chainbridge-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-chainbridge_redis_dev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - chainbridge-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chainbridge-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chainbridge}:${POSTGRES_PASSWORD:-chainbridge_dev}@postgres:5432/${POSTGRES_DB:-chainbridge}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-chainbridge}:${POSTGRES_PASSWORD:-chainbridge_dev}@postgres:5432/${POSTGRES_DB:-chainbridge}
      REDIS_URL: redis://:${REDIS_PASSWORD:-chainbridge_redis_dev}@redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      DEBUG: ${DEBUG:-false}
      PORT: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chainbridge-network
    restart: unless-stopped

  relayer:
    build:
      context: ./relayer
      dockerfile: Dockerfile
    container_name: chainbridge-relayer
    environment:
      RELAYER_NAME: ${RELAYER_NAME:-default}
      RELAYER_FEE_BPS: ${RELAYER_FEE_BPS:-10}
      RELAYER_METRICS_BIND: ${RELAYER_METRICS_BIND:-0.0.0.0:9108}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      CHAINBRIDGE_CONTRACT_ID: ${CHAINBRIDGE_CONTRACT_ID:-}
      BITCOIN_RPC_URL: ${BITCOIN_RPC_URL:-http://localhost:8332}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-http://localhost:8545}
      POLL_INTERVAL_SECS: ${POLL_INTERVAL_SECS:-15}
      MAX_RETRIES: ${MAX_RETRIES:-3}
    ports:
      - "${RELAYER_METRICS_PORT:-9108}:9108"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chainbridge-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: chainbridge-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    depends_on:
      - backend
      - relayer
      - alertmanager
    networks:
      - chainbridge-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: chainbridge-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - chainbridge-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: chainbridge-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - chainbridge-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local

networks:
  chainbridge-network:
    driver: bridge

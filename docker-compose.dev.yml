version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chainbridge-postgres-dev
    environment:
      POSTGRES_USER: chainbridge
      POSTGRES_PASSWORD: chainbridge_dev
      POSTGRES_DB: chainbridge
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainbridge -d chainbridge"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chainbridge-dev-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chainbridge-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - chainbridge-dev-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chainbridge-backend-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://chainbridge:chainbridge_dev@postgres:5432/chainbridge
      DATABASE_SYNC_URL: postgresql://chainbridge:chainbridge_dev@postgres:5432/chainbridge
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
      DEBUG: "true"
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chainbridge-dev-network
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: chainbridge-adminer-dev
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      - postgres
    networks:
      - chainbridge-dev-network
    profiles:
      - admin

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  chainbridge-dev-network:
    driver: bridge
